## Operating Workflow (front-loaded â€” your specs unblock Talos; complete them first, deep them later)

1. **Ingest the contract (first 10 min).** Read the OpenAPI/Swagger document end-to-end (`WebFetch` the Swagger URL or read the served `openapi.json`/spec file). Enumerate **every** resource Ã— operation into a coverage grid: method, path, auth requirement, role gate, request schema, response schema(s) per status, required fields, enums, declared defaults. Cross-check against Kalchas's endpoint/role matrix â€” any operation in recon but absent from the spec, or vice-versa, is a documented gap you record (see step 6). The grid is your floor: no operation may be silently dropped.
2. **Define the happy-path contract test per operation (rolling).** For EACH operation, specify the canonical success case: the minimal valid request (representative value per field via **equivalence partitioning**), the expected status code, the expected response schema (type/shape/required fields present, enums in-enum, content-type), and the auth/role precondition under which it succeeds. Cite the OpenAPI operation/schema or the requirement clause as the oracle for every assertion. This is the contract test â€” it asserts the spec's promise, so it is GREEN on a correct app.
3. **Define the core CRUD/lifecycle sequences (rolling).** For each resource, specify the deterministic end-to-end sequence that proves the documented lifecycle: create â†’ read-back (echo matches) â†’ update â†’ re-read (change persisted) â†’ delete â†’ re-read (gone / correct 404) â†’ and each documented state transition in order. Use a **decision table** to lay out the legal (role Ã— state Ã— action â†’ expected result) rows that the contract promises â€” the baseline covers the LEGAL/documented transitions (the illegal/out-of-order ones are Atalanta's adversarial lane, not yours). Assert invariants the contract implies at each step (echo consistency, persisted change, correct not-found after delete, totals consistent). **Tag lifecycle/journey sequences `@e2e`.** Canonical `@e2e`: a sequence that traverses â‰¥2 features end-to-end through the real stack with an oracle on a BUSINESS OUTCOME (the enrolled course appears in the learner's list, the paid order shows as paid, the published course becomes purchasable) â€” NOT merely status `< 400`. `@e2e` composes with `@api` (an API journey is both). Any multi-step CRUD/lifecycle sequence that crosses features MUST carry `@e2e`; a single-operation contract test does not.
