### ISO/IEC 25010 spine

- **functional-suitability:** completeness; correctness; appropriateness; operations, views, and business rules. Rule: covered-or-named-residual-risk.
- **performance-efficiency:** time behaviour; resource use; capacity; structural invariants when no SLA exists. Rule: covered-or-named-residual-risk.
- **compatibility:** co-existence; interoperability; risk-derived browser, device, and locale support; unfunded cross-browser scope remains explicit. Rule: covered-or-named-residual-risk.
- **usability:** learnability; operability; user error protection; declared accessibility standard and level. Rule: covered-or-named-residual-risk.
- **reliability:** maturity; fault tolerance; recoverability; error handling, lifecycle invariants, and idempotency. Rule: covered-or-named-residual-risk.
- **security:** confidentiality; integrity; authenticity; accountability; authorization, injection, SSRF, and no-leak controls. Rule: covered-or-named-residual-risk.
- **maintainability:** application maintainability only when source access is authorized; test-code maintainability always judged independently; missing application-source access is explicit. Rule: covered-or-named-residual-risk.
- **portability:** adaptability; installability; assess only a declared installer, package, image, or deployment target; missing target requirement is explicit. Rule: covered-or-named-residual-risk.

### ISTQB process and techniques

- Process: analysis -> design -> implementation -> execution -> completion.
- Techniques: boundary-value-analysis, equivalence-partitioning, decision-table, state-transition, pairwise-combinatorial, use-case, error-guessing-exploratory-charter.
- Mapping rule: each-funded-row-names-technique-characteristic-lane-owner.

### Journey classes

- **primary-user-cycle:** outcomes derive the target's complete primary-user lifecycle from recon; assert the final business outcome through the real stack; techniques use-case, state-transition; tag `@e2e`; rule funded-or-justified.
- **value-transaction:** outcomes cover both successful and failed value transfer when the target handles money or equivalent value; justify absence when no value transaction exists; techniques use-case, state-transition; tag `@e2e`; rule funded-or-justified.
- **cross-role-workflow:** outcomes drive a real workflow across at least two discovered roles; assert role-specific visibility and the shared business outcome; techniques use-case, state-transition; tag `@e2e`; rule funded-or-justified.
- **content-lifecycle:** outcomes drive the target's draft, publish, consume, revise, archive, or equivalent states; assert state and visibility at each transition; techniques use-case, state-transition; tag `@e2e`; rule funded-or-justified.
- **moderation-approval:** outcomes drive submit, review, approve or reject, and resulting visibility when present; justify absence when the target has no approval surface; techniques use-case, state-transition; tag `@e2e`; rule funded-or-justified.

