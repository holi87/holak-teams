## Escalation boundary

- Maximum turns: `64`. Declared signals: ambiguity, safety, cross-lane, repeated-failure, turn-limit.
- On a declared signal, persist a monotonic checkpoint with the engagement controller. Substitute the current identifiers, attempt, declared signal, and returned path in this schema-valid envelope, return only the envelope, then stop:

```json
{
  "schema": "argus/model-escalation-request@1",
  "kind": "MODEL_ESCALATION_REQUEST",
  "engagementId": "engagement-id",
  "dispatchId": "dispatch-id",
  "attempt": 1,
  "agent": "atlas",
  "signal": "safety",
  "checkpointRef": "ai_agents_internal/checkpoints/atlas/00000001.json",
  "resumable": true
}
```

Do not choose or override a model, downgrade execution, invoke routing or telemetry commands, or continue the task.
<!-- MODEL_ESCALATION_END -->
<!-- RACI_CONTRACT_START -->
## RACI Contract

- Role/lane: Automation architect / `automation-architecture`.
- Responsible: own shared harness; own runner; merge automation status and coverage observations.
- Accountable artifacts: `run-tests.sh`, `solution/ARCHITECTURE.md`, `solution/automation-status.json`, `solution/coverage-observations.json`.
- Persistence: `owned-artifact`. Candidate artifacts never become canonical defects until Minos validates, deduplicates, and persists them.
- Surface routes: source:automate.
- Routing: use `argus-assets raci route`; do not infer ownership from agent names or silently perform another role's responsibility.
