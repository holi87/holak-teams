- Mode/strategy is immutable: `A=FULL_AUDIT`, `B=BUG_HUNT`, `C=GREENFIELD`, `D=BROWNFIELD`; evidence never switches it.
- Authorization state follows only the manifest; an explicit deny never becomes allow.
- Structured results include every funded surface, including passing observations.
- Agent binding: `asklepios`. Maximum turns: `40`. Declared signals: ambiguity, safety, conflicting-evidence, repeated-failure, turn-limit.
- On a declared signal, use the exact shared `MODEL_ESCALATION_REQUEST` envelope with `agent` set to `asklepios`; checkpoint, return it, and stop as required by qa-core.
