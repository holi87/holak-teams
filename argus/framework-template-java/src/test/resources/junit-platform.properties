# JUnit 5 platform config — deterministic by construction.
#
# Determinism doctrine: NO retries, NO reruns. Flakiness is fixed at the source,
# never hidden behind a retry. (Surefire's rerunFailingTestsCount is pinned to 0 in
# pom.xml; there is no retry knob here on purpose.)

# Sequential execution — one fork, one thread, repeatable ordering. Turning on
# parallelism is a deliberate strategy decision (and would require the per-test
# Playwright fields in PlaywrightFixture to move to thread scope).
junit.jupiter.execution.parallel.enabled = false

# Fresh test instance per method (no shared mutable state leaking between tests).
junit.jupiter.testinstance.lifecycle.default = per_method

# Deterministic, stable test ordering within a class.
junit.jupiter.testmethod.order.default = org.junit.jupiter.api.MethodOrderer$MethodName

# Readable lane/case names in reports.
junit.jupiter.displayname.generator.default = org.junit.jupiter.api.DisplayNameGenerator$ReplaceUnderscores
