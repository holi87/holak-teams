name: Validate Argus contracts

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  release-contracts:
    name: Full marketplace release gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code CLI
        run: npm install --global @anthropic-ai/claude-code

      - name: Run the documented full release validation
        run: scripts/validate-release.sh
