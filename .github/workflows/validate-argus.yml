name: Validate Argus contracts

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  release-contracts:
    name: Full marketplace release gate
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code CLI
        run: npm install --global @anthropic-ai/claude-code @openai/codex

      - name: Install native sandbox runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          sudo sysctl --write kernel.apparmor_restrict_unprivileged_userns=0
          bwrap --die-with-parent --new-session --unshare-all --share-net \
            --ro-bind / / --proc /proc /bin/true

      - name: Run the documented full release validation
        run: scripts/validate-release.sh
